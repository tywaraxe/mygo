<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Its mygo!!!!!!!</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .fullscreen-bg {
            height: 100dvh;
            width: 100vw;
            display: flex;
            
            /* Positions the button at the bottom right */
            justify-content: flex-end;
            align-items: flex-end;
            
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain; 
            
            box-sizing: border-box;
            padding: 30px; 
            
            image-rendering: -webkit-optimize-contrast;
        }

        .discord-btn {
            padding: 14px 28px;
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        .discord-btn:hover {
            background-color: #4752C4;
            transform: translateY(-2px);
        }

        .lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            z-index: 100;
            transition: all 0.2s;
        }

        .lang-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        @media (max-width: 767px) {
            .fullscreen-bg {
                padding: 20px;
                /* Keeps button at bottom right even on mobile */
                justify-content: flex-end; 
            }
            .discord-btn {
                font-size: 0.9rem;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>

    <button class="lang-toggle" id="lang-btn">EN / 中文</button>

    <div class="fullscreen-bg" id="bg-container">
        <a href="https://discord.its-my-go.com" class="discord-btn">Join Discord</a>
    </div>

    <script>
        const bgContainer = document.getElementById('bg-container');
        const langBtn = document.getElementById('lang-btn');
        
        const imgZh = "img/itsmygocn1.png"; 
        const imgDefault = "img/itsmygo.png";

        let currentIsZh = (navigator.language || navigator.userLanguage).startsWith('zh');

        function updateBackground(isZh) {
            bgContainer.style.backgroundImage = `url('${isZh ? imgZh : imgDefault}')`;
            langBtn.textContent = isZh ? "English" : "中文";
        }

        langBtn.addEventListener('click', () => {
            currentIsZh = !currentIsZh;
            updateBackground(currentIsZh);
        });

        updateBackground(currentIsZh);
    </script>
</body>
</html>
